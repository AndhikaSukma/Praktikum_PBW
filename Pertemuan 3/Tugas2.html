<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2</title>
    <style>
        
        .container {
            display: flex;
            width: 100%;
            padding: 20px;
        }

        .content {
            border: 2px solid black;
            padding: 20px;
            width: 400px;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="content">
            <h4>Nama: <input type="text" name="Nama"></h4>
            <h4>Email: <input type="email" name="Email"></h4>
            <h4>Jenis Kelamin: 
                <label>
                    <input type="radio" name="Gender" id="Male">Laki-laki</label>
                <label><input type="radio" name="Gender" id="Female">Perempuan</label>
            </h4>
            <h4>Hobi:
                <label><input type="checkbox" name="Hobi" id="Musik">Musik</label>
                <label><input type="checkbox" name="Hobi" id="Olahraga">Olahraga</label>
            </h4>
            <h4>Pilih Kota:
            <select name="pilihan" id="kota">
                <option value="1">Jakarta</option>
                <option value="2">Bandung</option>
                <option value="3">Karawang</option>
                <option value="4">Bekasi</option>
            </select>
            </h4>
            <h4>
                <label for="file">Pilih File:</label>
                <input type="file" id="file" name="file">
            </h4>
            <button type="submit" class="btn">Daftar</button>
        </section>
    </div>
</body>
</html>
